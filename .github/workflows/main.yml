name: Weekly Agent Runs

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Also allows manual trigger

jobs:
  run-porsche-scout:
    name: Porsche 911 Scout
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Porsche 911 Scout session
        run: |
          curl -X POST https://api.anthropic.com/v1/sessions \
          -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
          -H "anthropic-version: 2023-06-01" \
          -H "anthropic-beta: managed-agents-2026-04-01" \
          -H "Content-Type: application/json" \
          -d '{
            "agent": "${{ secrets.PORSCHE_SCOUT_AGENT_ID }}",
            "environment_id": "${{ secrets.ENVIRONMENT_ID }}",
            "vault_ids": ["${{ secrets.VAULT_ID }}"]
          }'

  run-cultural-events-scout:
    name: London Cultural Events Scout
    runs-on: ubuntu-latest
    steps:
      - name: Trigger London Cultural Events Scout session
        run: |
          curl -X POST https://api.anthropic.com/v1/sessions \
          -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
          -H "anthropic-version: 2023-06-01" \
          -H "anthropic-beta: managed-agents-2026-04-01" \
          -H "Content-Type: application/json" \
          -d '{
            "agent": "${{ secrets.CULTURAL_SCOUT_AGENT_ID }}",
            "environment_id": "${{ secrets.ENVIRONMENT_ID }}",
            "vault_ids": ["${{ secrets.VAULT_ID }}"]
          }'
